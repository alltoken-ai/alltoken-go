name: Auto Release

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'chore/sync-spec')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      - name: Determine next version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.1.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "NEW_TAG=${NEW_TAG}" >> "$GITHUB_ENV"

      - name: Tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${NEW_TAG}" \
            --title "${NEW_TAG}" \
            --notes "Auto-release from OpenAPI spec sync."

      - name: Notify Feishu
        if: always()
        run: |
          [ -z "${{ secrets.ALERT_WEBHOOK }}" ] && exit 0
          if [ "${{ job.status }}" = "success" ]; then
            MSG="alltoken-go ${NEW_TAG} released"
          else
            MSG="alltoken-go auto-release failed. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "${{ secrets.ALERT_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"${MSG}\"}}"
