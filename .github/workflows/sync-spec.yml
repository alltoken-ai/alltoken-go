name: Sync OpenAPI Spec

on:
  workflow_dispatch:  # Triggered by GitLab CI when OpenAPI spec changes

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Clone megaopenrouter
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.GITLAB_TOKEN }}@${{ secrets.GITLAB_REPO_URL }} ../megaopenrouter

      - name: Validate OpenAPI specs
        run: |
          go install github.com/pb33f/libopenapi-validator/cmd/openapi-validator@latest
          openapi-validator ../megaopenrouter/openapi/chat.yml || true
          openapi-validator ../megaopenrouter/openapi/account.yml || true

      - name: Run codegen
        run: go run scripts/generate.go

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet internal/gen/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/sync-spec-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add internal/gen/
          git commit -m "chore: sync generated types from latest OpenAPI spec"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: sync OpenAPI spec types ($(date +%Y-%m-%d))" \
            --body "Auto-generated from latest megaopenrouter OpenAPI spec." \
            --base main
